<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PestPros AI Sales Trainer</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#0f172a;color:#e2e8f0;margin:0}
header{padding:16px;background:#020617;border-bottom:1px solid #1e293b}
h1{margin:0;font-size:22px}
.container{max-width:900px;margin:20px auto;padding:20px}
.card{background:#020617;border:1px solid #1e293b;border-radius:8px;padding:16px;margin-bottom:20px}
input,button,textarea{font-size:14px;padding:8px;border-radius:6px;border:1px solid #334155;background:#0f172a;color:#e2e8f0}
button{cursor:pointer;background:#f59e0b;border:none;color:black;font-weight:bold}
button:hover{opacity:.9}
.chat{height:300px;overflow:auto;border:1px solid #1e293b;padding:10px;background:#020617}
.msg{margin-bottom:10px}
.msg.rep{color:#38bdf8}
.msg.ai{color:#f59e0b}
.small{font-size:12px;color:#94a3b8}
</style>
</head>

<body>

<header>
<h1>PestPros AI Sales Trainer</h1>
</header>

<div class="container">

<div class="card" id="authCard">
<h3>Login</h3>
<input id="authEmail" type="email" placeholder="Email"><br><br>
<input id="authPassword" type="password" placeholder="Password" autocomplete="current-password"><br><br>
<button onclick="login()">Login</button>
<p class="small">Admin email bypass enabled.</p>
</div>

<div class="card" id="dashboard" style="display:none">
<h3>Dashboard</h3>
<button onclick="startSession()">Start Training Session</button>
<button onclick="checkout('starter')">Buy Starter</button>
<button onclick="checkout('pro')">Buy Pro</button>
<button onclick="checkout('team')">Buy Team</button>
</div>

<div class="card" id="session" style="display:none">
<h3>Training Session</h3>
<div class="chat" id="chat"></div><br>
<textarea id="repInput" placeholder="Type your sales pitch..." rows="3"></textarea><br><br>
<button onclick="sendRep()">Send</button>
</div>

</div>

<script>

/* =============================
CONFIGURATION (EDIT THESE)
============================= */

const CONFIG={
OPENAI_API_KEY:"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
",
SUPABASE_URL:"https://gziqvoqhtuwbpphiaduy.supabase.co",
SUPABASE_ANON_KEY:"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6aXF2b3FodHV3YnBwaGlhZHV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NDU3MjgsImV4cCI6MjA4OTAyMTcyOH0.zRy3KIB7TroXv8KFmATA_MY_1dsQd85iQxksvTa0wmA
",
ADMIN_EMAIL:"dutchpeil@gmail.com",

STRIPE_STARTER_LINK:"https://buy.stripe.com/bJe28t5NheIqerd5sYbfO00",
STRIPE_PRO_LINK:"https://buy.stripe.com/bJe28t5NheIqerd5sYbfO00",
STRIPE_TEAM_LINK:"https://buy.stripe.com/bJe28t5NheIqerd5sYbfO00"
}

/* =============================
STATE
============================= */

let state={
user:null,
sessionActive:false
}

let lastSessionTime=0

function allowSession(){
const now=Date.now()
if(now-lastSessionTime<5000){
alert("Please wait a few seconds before starting another session.")
return false
}
lastSessionTime=now
return true
}

/* =============================
SUPABASE INIT
============================= */

let supabase=null

async function initSupabase(){
const {createClient}=await import("https://esm.sh/@supabase/supabase-js")
supabase=createClient(CONFIG.SUPABASE_URL,CONFIG.SUPABASE_ANON_KEY)

const {data}=await supabase.auth.getSession()
if(data.session){
state.user=data.session.user
showDashboard()
}
}

initSupabase()

/* =============================
AUTH
============================= */

async function login(){

const email=document.getElementById("authEmail").value
const password=document.getElementById("authPassword").value

if(email===CONFIG.ADMIN_EMAIL){
state.user={email}
showDashboard()
return
}

const {data,error}=await supabase.auth.signInWithPassword({email,password})

if(error){
alert(error.message)
return
}

state.user=data.user
showDashboard()

}

function showDashboard(){

document.getElementById("authCard").style.display="none"
document.getElementById("dashboard").style.display="block"

}

/* =============================
SESSION
============================= */

function startSession(){

if(!allowSession()) return

state.sessionActive=true

document.getElementById("dashboard").style.display="none"
document.getElementById("session").style.display="block"

addMsg("ai","Hello, I'm a homeowner. What do you want?")

}

function addMsg(type,text){

const chat=document.getElementById("chat")

const div=document.createElement("div")
div.className="msg "+type
div.innerText=text

chat.appendChild(div)
chat.scrollTop=chat.scrollHeight

}

/* =============================
OPENAI CHAT
============================= */

async function sendRep(){

const input=document.getElementById("repInput")
const text=input.value.trim()
if(!text) return

addMsg("rep",text)
input.value=""

const ai=await homeownerReply(text)

addMsg("ai",ai)

}

async function homeownerReply(text){

const key=window.OPENAI_API_KEY||CONFIG.OPENAI_API_KEY

const res=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+key
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:"You are a skeptical homeowner responding to a door to door pest control salesperson. Keep replies short."},
{role:"user",content:text}
],
max_tokens:60
})
})

const data=await res.json()

return data.choices[0].message.content

}

/* =============================
STRIPE
============================= */

function checkout(plan){

if(plan==="starter")
window.location.href=CONFIG.STRIPE_STARTER_LINK

if(plan==="pro")
window.location.href=CONFIG.STRIPE_PRO_LINK

if(plan==="team")
window.location.href=CONFIG.STRIPE_TEAM_LINK

}

</script>

</body>
</html>
