<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PestPros AI Sales Trainer</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#07090F;color:#EFF6FF;height:100vh;overflow:hidden;display:flex;flex-direction:column}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#ffffff15;border-radius:2px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes ripple{0%{transform:scale(1);opacity:.6}100%{transform:scale(2.6);opacity:0}}
@keyframes glowRed{0%,100%{box-shadow:0 0 16px rgba(239,68,68,.5)}50%{box-shadow:0 0 36px rgba(239,68,68,.9)}}
@keyframes barAnim{0%,100%{transform:scaleY(.2)}50%{transform:scaleY(1)}}
@keyframes popIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
.app{display:flex;flex:1;overflow:hidden}
.sidebar{width:195px;background:#0F1520;border-right:1px solid #ffffff0d;display:flex;flex-direction:column;flex-shrink:0}
.main{flex:1;overflow-y:auto;background:#07090F}
.logo-wrap{padding:16px 13px 12px;border-bottom:1px solid #ffffff0d}
.stat-label{font-size:9px;color:#ffffff30;letter-spacing:.12em;font-family:'Courier New',monospace;margin-bottom:6px}
.stat-val{font-size:34px;font-weight:700;line-height:1;font-family:'Courier New',monospace}
.role-wrap{padding:10px 10px 8px;border-bottom:1px solid #ffffff0d}
.role-btns{display:flex;gap:3px;background:#07090F;border-radius:5px;padding:3px}
.role-btn{flex:1;padding:4px 0;border-radius:3px;border:none;cursor:pointer;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;font-family:'Courier New',monospace;transition:all .15s}
.role-btn.on{background:#F59E0B;color:#000}
.role-btn:not(.on){background:transparent;color:#ffffff30}
nav{padding:7px 5px;flex:1}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:5px;color:#ffffff30;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;user-select:none}
.nav-item:hover{color:#EFF6FFaa;background:#1A2540}
.nav-item.on{color:#EFF6FF;background:#1A2540}
.user-row{padding:10px 11px;border-top:1px solid #ffffff0d;display:flex;align-items:center;gap:8px}
.avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#3B82F6,#1D4ED8);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0}
.page{padding:24px 28px;max-width:900px;animation:fadeUp .3s ease}
.card{background:#141E2E;border:1px solid #ffffff0d;border-radius:9px}
.stat-card{background:#141E2E;border:1px solid #ffffff0d;border-radius:9px;padding:16px 18px}
.pill{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.07em;font-family:'Courier New',monospace}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;user-select:none}
.btn:active:not(:disabled){transform:scale(.96)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-amber{background:#F59E0B;color:#000}.btn-amber:hover:not(:disabled){background:#FBBF24}
.btn-ghost{background:transparent;color:#ffffff60;border:1px solid #ffffff0d}.btn-ghost:hover:not(:disabled){background:#141E2E;color:#EFF6FF}
.btn-raised{background:#141E2E;color:#EFF6FF;border:1px solid #ffffff0d}.btn-raised:hover:not(:disabled){background:#1c2840}
.score-bar-bg{background:#0F1520;border-radius:4px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:4px;transition:width 1s ease}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:10px 16px}
th{font-size:9px;font-weight:700;color:#ffffff30;letter-spacing:.1em;font-family:'Courier New',monospace;background:#0F1520}
tbody tr{border-top:1px solid #ffffff08;transition:background .1s}
tbody tr:hover td{background:#141E2E}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:500}
.modal-card{background:#141E2E;border:1px solid #ffffff0d;border-radius:12px;padding:36px 40px;width:420px;max-height:90vh;overflow-y:auto}
.input-field{width:100%;padding:11px 14px;background:#07090F;border:1px solid #ffffff15;border-radius:7px;color:#EFF6FF;font-size:13px;outline:none;transition:border-color .15s;font-family:inherit;margin-bottom:12px}
.input-field:focus{border-color:#F59E0B}
.session-screen{position:fixed;inset:0;background:#07090F;display:flex;flex-direction:column;z-index:200}
.msg-wrap{display:flex;gap:10px;animation:fadeUp .2s ease}
.msg-bubble{max-width:66%;padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.6}
.msg-tag{font-size:9px;font-weight:700;letter-spacing:.1em;font-family:'Courier New',monospace;margin-bottom:3px}
.mic-btn{width:66px;height:66px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;transition:background .15s,box-shadow .15s;position:relative;z-index:1}
.ring-wrap{position:relative;flex-shrink:0}
.ring-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Courier New',monospace;font-weight:700}
input,textarea,button{font-family:inherit}
.gpt-card{background:#141E2E;border:1px solid #ffffff0d;border-radius:9px;padding:16px 18px}
.gpt-area{width:100%;min-height:170px;padding:12px 14px;background:#07090F;border:1px solid #ffffff14;border-radius:8px;color:#EFF6FF;font-size:13px;line-height:1.6;resize:vertical;font-family:inherit}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:5px;font-size:10px;font-weight:700;letter-spacing:.07em}
.upgrade-modal{background:#141E2E;border:1px solid #F59E0B40;border-radius:12px;padding:24px;text-align:center}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ═══════════════════════════════════════════════════════════════════
// SUPABASE INITIALIZATION
// ═══════════════════════════════════════════════════════════════════
const SUPABASE_URL = localStorage.getItem('supabase_url') || '';
const SUPABASE_ANON_KEY = localStorage.getItem('supabase_anon_key') || '';
let supabase = null;

async function initSupabase(url, key) {
  if (!url || !key) return null;
  try {
    supabase = window.supabase.createClient(url, key);
    localStorage.setItem('supabase_url', url);
    localStorage.setItem('supabase_anon_key', key);
    return supabase;
  } catch (e) {
    console.error('Supabase init failed:', e.message);
    return null;
  }
}

if (SUPABASE_URL && SUPABASE_ANON_KEY) {
  initSupabase(SUPABASE_URL, SUPABASE_ANON_KEY);
}

// ═══════════════════════════════════════════════════════════════════
// COLOR & UI CONSTANTS
// ═══════════════════════════════════════════════════════════════════
const S={
  bg:'#07090F',surface:'#0F1520',card:'#141E2E',
  amber:'#F59E0B',amberBg:'rgba(245,158,11,.1)',
  blue:'#3B82F6',blueBg:'rgba(59,130,246,.1)',
  green:'#10B981',greenBg:'rgba(16,185,129,.1)',
  red:'#EF4444',redBg:'rgba(239,68,68,.1)',
  purple:'#8B5CF6',purpleBg:'rgba(139,92,246,.1)',
  text:'#EFF6FF',muted:'rgba(239,246,255,.55)',faint:'rgba(239,246,255,.25)',
};
const sc=v=>v>=72?S.green:v>=50?S.amber:S.red;
const sg=v=>v>=85?'Elite':v>=72?'Strong':v>=55?'Developing':'Needs Work';

const SCENARIOS=[
  {id:1,label:'Skeptical Homeowner',personality:'skeptical',pest:'ants',season:'spring',competitor:'Terminix'},
  {id:2,label:'Friendly but Hesitant',personality:'friendly',pest:'spiders',season:'summer',competitor:'none'},
  {id:3,label:'Busy / Time-Pressured',personality:'busy',pest:'rodents',season:'fall',competitor:'Orkin'},
  {id:4,label:'Budget-Conscious',personality:'frugal',pest:'mosquitoes',season:'spring',competitor:'none'},
];
const DIFFS=[
  {level:1,color:S.green,tag:'EASY',desc:'Patient. Great for warm-up reps.'},
  {level:2,color:S.blue,tag:'MED',desc:'Some pushback. Real-world pacing.'},
  {level:3,color:S.amber,tag:'HARD',desc:'Skeptical. Value framing required.'},
  {level:4,color:S.red,tag:'ELITE',desc:'Will hang up if you stumble early.'},
];

const STRIPE_PLANS = [
  {id:'starter',name:'Starter',price:'$29/mo',features:['5 sessions/month','Basic scoring','Email support']},
  {id:'pro',name:'Pro',price:'$99/mo',features:['Unlimited sessions','Advanced analytics','Priority support','Team leaderboard']},
  {id:'team',name:'Team',price:'$299/mo',features:['Unlimited everything','5 team seats','Manager dashboard','Custom scenarios']},
];

const CUSTOM_GPT_URL='https://chatgpt.com/g/g-67be87f079888191bfa2e2dcd1e66771-sales-trainer';
const GPT_POPUP='width=980,height=860,left='+(window.screenX+Math.max(40,Math.round((window.outerWidth-980)/2)))+',top='+(window.screenY+Math.max(40,Math.round((window.outerHeight-860)/2)))+',resizable=yes,scrollbars=yes';

// ═══════════════════════════════════════════════════════════════════
// GLOBAL STATE
// ═══════════════════════════════════════════════════════════════════
let state={
  view:'auth',
  role:'rep',
  user:null,
  apiKey:(localStorage.getItem('pestpros_openai_key')||''),
  subscriptionTier:'free',
  sessionDiff:2,
  sessionScen:SCENARIOS[0],
  gptTranscript:(localStorage.getItem('pestpros_gpt_transcript')||''),
  gptScore:null,
  sessions:[],
  leaderboard:[],
  showUpgradeModal:false,
  authMode:'login',
  authEmail:'',
  authPassword:'',
  authError:'',
};

let SS=null;
let recorderRef=null;
let recChunks=[];

// ═══════════════════════════════════════════════════════════════════
// STATE MANAGEMENT
// ═══════════════════════════════════════════════════════════════════
function setState(patch){Object.assign(state,patch);render();}
function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}

function needsUpgrade(){
  if(state.subscriptionTier==='pro'||state.subscriptionTier==='team') return false;
  if(state.subscriptionTier==='starter') return state.sessions?.length>=5;
  return true;
}

// ═══════════════════════════════════════════════════════════════════
// SUPABASE AUTH
// ═══════════════════════════════════════════════════════════════════
async function signUp(email, password) {
  if (!supabase) return setState({authError:'Supabase not configured'});
  state.authError='';
  try {
    const {data, error} = await supabase.auth.signUp({email, password});
    if (error) return setState({authError:error.message});
    setState({user:data.user, view:'dashboard', authMode:'login', authEmail:'', authPassword:''});
    await loadUserData();
  } catch (e) {
    setState({authError:e.message});
  }
}

async function logIn(email, password) {
  if (!supabase) return setState({authError:'Supabase not configured'});
  state.authError='';
  try {
    const {data, error} = await supabase.auth.signInWithPassword({email, password});
    if (error) return setState({authError:error.message});
    setState({user:data.user, view:'dashboard', authMode:'login', authEmail:'', authPassword:''});
    await loadUserData();
  } catch (e) {
    setState({authError:e.message});
  }
}

async function logOut() {
  if (supabase) {
    await supabase.auth.signOut();
  }
  setState({user:null, view:'auth', sessions:[], subscriptionTier:'free'});
}

async function loadUserData() {
  if (!supabase || !state.user) return;
  try {
    const {data, error} = await supabase.from('users').select('*').eq('id', state.user.id).single();
    if (error && error.code !== 'PGRST116') throw error;
    if (data) {
      setState({subscriptionTier:data.subscription_tier||'free'});
    } else {
      await supabase.from('users').insert({id:state.user.id, email:state.user.email, subscription_tier:'free'});
    }
  } catch (e) {
    console.error('Load user data error:', e.message);
  }
}

// ═══════════════════════════════════════════════════════════════════
// SCENARIO & PROMPT GENERATION
// ═══════════════════════════════════════════════════════════════════
function buildSysPrompt(scenario, difficulty) {
  const tones=[
    'Be patient and somewhat open.',
    'Be mildly skeptical. Push back on price and time commitment.',
    'Be quite skeptical. Require strong value framing before warming up.',
    'Be very guarded. End the call if the rep stumbles in the first 2-3 turns.'
  ];
  return `You are a homeowner answering your front door to a door-to-door pest control sales rep.
Context: It is ${scenario.season}. You have a ${scenario.pest} problem. ${scenario.competitor!=='none'?`You currently use ${scenario.competitor} but are not fully satisfied.`:'You have no current pest service.'}
Personality: ${scenario.personality}. ${tones[difficulty-1]}
Rules: Stay in character. Keep replies 1-3 sentences MAX. React naturally to rep quality. Opening: greet based on your personality.`;
}

function currentScenarioPrompt(){
  const s=state.sessionScen,d=state.sessionDiff;
  return `Act as a homeowner answering the door to a pest control rep. Stay fully in role the entire time.\n\nScenario: ${s.label}\nPrimary pest issue: ${s.pest}\nSeason: ${s.season}\nCurrent competitor: ${s.competitor==='none'?'none':s.competitor}\nDifficulty: L${d} ${DIFFS[d-1].tag}\nTone guidance: ${buildSysPrompt(s,d).replace(/\n/g,' ')}\n\nStart with your first homeowner line only. Keep every reply 1-3 sentences.`;
}

function launchCustomGPT(mode='popup'){
  const txt=currentScenarioPrompt();
  navigator.clipboard.writeText(txt).catch(()=>{});
  state.gptLastLaunch=new Date().toLocaleString();
  state.gptLaunchMode=mode;
  state.gptWindowOpen=true;
  if(mode==='tab') window.open(CUSTOM_GPT_URL,'_blank');
  else window.open(CUSTOM_GPT_URL,'pestpros_gpt',GPT_POPUP);
  alert('Your Sales Trainer GPT opened. Scenario prompt copied to clipboard. Paste it into the GPT, run the roleplay, then return here and paste the transcript.');
}

// ═══════════════════════════════════════════════════════════════════
// OPENAI API CALLS
// ═══════════════════════════════════════════════════════════════════
async function callGPT(messages){
  if(!state.apiKey) throw new Error('API key required');
  const r=await fetch('https://api.openai.com/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+state.apiKey},
    body:JSON.stringify({model:'gpt-4o-mini',messages,max_tokens:250,temperature:.85})
  });
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||'API error');}
  return (await r.json()).choices[0].message.content.trim();
}

async function scoreTranscriptWithOpenAI(){
  const tx=(document.getElementById('gptTranscriptInput')?.value||state.gptTranscript||'').trim();
  if(!tx) return setState({gptScore:null, authError:'Paste the GPT conversation transcript first.'});
  if(!state.apiKey) return setState({authError:'Add your OpenAI API key first.'});
  
  try {
    setState({authError:'Scoring...'});
    const resp=await callGPT([
      {role:'system',content:'You are scoring a pest control sales rep roleplay. Return ONLY valid JSON: {"overall":0-100,"opener":0-100,"rapport":0-100,"discovery":0-100,"objections":0-100,"closing":0-100,"summary":"one short paragraph","next_steps":["tip 1","tip 2","tip 3"]}'},
      {role:'user',content:`Scenario: ${state.sessionScen.label} | Difficulty: L${state.sessionDiff}\n\nTranscript:\n${tx}`}
    ]);
    let parsed;
    try{ 
      parsed=JSON.parse(resp.replace(/```json|```/g,'').trim()); 
    } catch(e){ 
      parsed={overall:64,opener:63,rapport:65,discovery:61,objections:62,closing:58,summary:resp,next_steps:['Tighten opener','Ask one deeper discovery question','Move to close earlier']}; 
    }
    setState({gptScore:parsed, authError:''});
    localStorage.setItem('pestpros_gpt_transcript',tx);
  } catch(e) {
    setState({authError:'Scoring failed: '+e.message});
  }
}

// ═══════════════════════════════════════════════════════════════════
// SESSION MANAGEMENT
// ═══════════════════════════════════════════════════════════════════
async function saveSession() {
  if (!supabase || !state.user) return;
  const session = {
    user_id: state.user.id,
    scenario: state.sessionScen.label,
    difficulty: state.sessionDiff,
    score: state.gptScore?.overall || 0,
    transcript: state.gptTranscript,
    created_at: new Date().toISOString()
  };
  try {
    await supabase.from('sessions').insert([session]);
    await loadSessions();
    setState({gptTranscript:'', gptScore:null});
  } catch (e) {
    console.error('Save session error:', e.message);
  }
}

async function loadSessions() {
  if (!supabase || !state.user) return;
  try {
    const {data} = await supabase.from('sessions').select('*').eq('user_id', state.user.id).order('created_at', {ascending:false});
    setState({sessions:data||[]});
  } catch (e) {
    console.error('Load sessions error:', e.message);
  }
}

async function loadLeaderboard() {
  if (!supabase) return;
  try {
    const {data} = await supabase.from('leaderboard').select('*').order('score', {ascending:false}).limit(10);
    setState({leaderboard:data||[]});
  } catch (e) {
    console.error('Load leaderboard error:', e.message);
  }
}

// ═══════════════════════════════════════════════════════════════════
// LIVE SESSION STATE MACHINE
// ═══════════════════════════════════════════════════════════════════
async function initSession(){
  if(needsUpgrade()) return setState({showUpgradeModal:true});
  const {scenario,diff}=({scenario:state.sessionScen,diff:state.sessionDiff});
  const openings={
    skeptical:"Can I help you? I'm not really interested in buying anything.",
    friendly:"Hi! What can I do for you?",
    busy:"Yeah? Make it quick — I'm in the middle of something.",
    frugal:"Hi. Fair warning — I'm on a pretty tight budget."
  };
  SS={
    sysPrompt:buildSysPrompt(scenario,diff),scenario,diff,
    history:[{role:'assistant',content:openings[scenario.personality]||"Hi, what can I do for you?"}],
    displayMsgs:[{speaker:'ai',text:openings[scenario.personality]||"Hi, what can I do for you?"}],
    phase:'speaking',status:'Homeowner speaking…',
    turns:0,maxTurns:8,error:'',endConfirm:false,done:false,_audio:null,
  };
  refreshSession();
  await speakLine(SS.history[0].content);
  if(!SS)return;
  SS.phase='idle';SS.status='Hold button to speak';
  refreshSession();
}

async function speakLine(text){
  try{
    if(!state.apiKey) return;
    const r=await fetch('https://api.openai.com/v1/audio/speech',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+state.apiKey},
      body:JSON.stringify({model:'tts-1',voice:'alloy',input:text,speed:1.0})
    });
    if(!r.ok) throw new Error('TTS error');
    const blob=new Blob([await r.arrayBuffer()],{type:'audio/mpeg'});
    const url=URL.createObjectURL(blob);
    await new Promise(res=>{
      const a=new Audio(url);
      a.onended=res;a.onerror=res;
      a.play().catch(res);
      if(SS)SS._audio=a;
    });
    URL.revokeObjectURL(url);
  }catch(e){console.warn('TTS skip:',e.message);}
}

async function startRecording(){
  if(!SS||SS.phase!=='idle')return;
  SS.error='';
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    const mime=MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':'audio/ogg';
    const rec=new MediaRecorder(stream,{mimeType:mime});
    recChunks=[];
    rec.ondataavailable=e=>{if(e.data.size>0)recChunks.push(e.data);};
    rec.start(100);
    recorderRef=rec;
    SS.phase='recording';SS.status='Recording… release to send';
    refreshSession();
  }catch(e){SS.error='Mic error: '+e.message;refreshSession();}
}

async function stopRecording(){
  if(!SS||SS.phase!=='recording'||!recorderRef)return;
  const rec=recorderRef;
  await new Promise(res=>{rec.onstop=res;rec.stop();rec.stream.getTracks().forEach(t=>t.stop());});
  const blob=new Blob(recChunks,{type:rec.mimeType});
  if(blob.size<800){SS.phase='idle';SS.status='Hold button to speak';refreshSession();return;}
  SS.phase='transcribing';SS.status='Transcribing…';refreshSession();
  try{
    const fd=new FormData();
    fd.append('file',blob,'audio.webm');
    fd.append('model','whisper-1');
    fd.append('language','en');
    const r=await fetch('https://api.openai.com/v1/audio/transcriptions',{
      method:'POST',
      headers:{'Authorization':'Bearer '+state.apiKey},
      body:fd
    });
    if(!r.ok) throw new Error('Transcription failed');
    const repText=((await r.json()).text||'').trim();
    if(!repText.trim()||!SS){if(SS){SS.phase='idle';SS.status='Hold button to speak';refreshSession();}return;}
    SS.displayMsgs.push({speaker:'rep',text:repText});
    SS.history.push({role:'user',content:repText});
    await doTurn();
  }catch(e){SS.error='Error: '+e.message;SS.phase='idle';SS.status='Hold button to speak';refreshSession();}
}

async function doTurn(){
  if(!SS)return;
  SS.turns++;
  if(SS.turns>=SS.maxTurns){await finishSession();return;}
  SS.phase='thinking';SS.status='Homeowner thinking…';refreshSession();
  try{
    const aiText=await callGPT([{role:'system',content:SS.sysPrompt},...SS.history]);
    if(!SS)return;
    SS.history.push({role:'assistant',content:aiText});
    SS.displayMsgs.push({speaker:'ai',text:aiText});
    const enders=['goodbye','not interested','please leave','have a good day','no thank you'];
    if(SS.diff>=3&&enders.some(e=>aiText.toLowerCase().includes(e))){
      SS.phase='speaking';SS.status='Homeowner speaking…';refreshSession();
      await speakLine(aiText);
      await finishSession();return;
    }
    SS.phase='speaking';SS.status='Homeowner speaking…';refreshSession();
    await speakLine(aiText);
    if(!SS)return;
    SS.phase='idle';SS.status='Hold button to speak';refreshSession();
  }catch(e){
    if(!SS)return;
    SS.error='Error: '+e.message;SS.phase='idle';SS.status='Hold button to speak';refreshSession();
  }
}

async function finishSession(){
  if(!SS)return;
  SS._audio?.pause();
  SS.phase='scoring';SS.status='Scoring session…';refreshSession();
  try{
    const tx=SS.history.map((m,i)=>`[${i}|${m.role==='user'?'REP':'HOMEOWNER'}]: "${m.content}"`).join('\n');
    const resp=await callGPT([
      {role:'system',content:`Score this pest control rep. Return ONLY valid JSON no markdown:
{"opener":0-100,"tonality":0-100,"discovery":0-100,"objections":0-100,"closing":0-100,"resilience":0-100,"outcome":"close_attempted|no_close|abandoned","notes":"2 sentences of specific coaching"}`},
      {role:'user',content:`Difficulty L${SS.diff} | Scenario: ${SS.scenario.label}\n\n${tx}`}
    ]);
    let scored;
    try{scored=JSON.parse(resp.replace(/\`\`\`json|\`\`\`/g,'').trim());}
    catch{scored={opener:60,tonality:60,discovery:55,objections:58,closing:50,resilience:62,outcome:'no_close',notes:'Session complete.'};}
    const W={opener:.22,tonality:.18,discovery:.15,objections:.25,closing:.10,resilience:.10};
    const raw=Object.entries(W).reduce((a,[k,w])=>a+(scored[k]||60)*w,0);
    const readiness=Math.min(Math.round(raw*[1,1.04,1.08,1.12][SS.diff-1]),100);
    state.gptScore={
      overall:readiness,
      opener:scored.opener||60,
      rapport:scored.tonality||60,
      discovery:scored.discovery||55,
      objections:scored.objections||58,
      closing:scored.closing||50,
      summary:scored.notes||'Session complete.',
      next_steps:[`Focus on ${scored.opener||60<65?'stronger openers':'tonality'}`,`Improve ${scored.discovery||55<65?'discovery questions':'objection handling'}`,scored.notes||'Great effort!']
    };
    SS.done=true;refreshSession();
    setTimeout(()=>{SS=null;setState({view:'gpt-results'});},1400);
  }catch(e){
    const r=55+Math.floor(Math.random()*20);
    state.gptScore={overall:r,opener:62,rapport:63,discovery:58,objections:60,closing:52,summary:'Scoring unavailable.',next_steps:['Check API key','Review scenario fit','Practice more']};
    SS.done=true;refreshSession();
    setTimeout(()=>{SS=null;setState({view:'gpt-results'});},1400);
  }
}

function endSession(){
  if(!SS)return;
  if(!SS.endConfirm){SS.endConfirm=true;refreshSession();return;}
  SS._audio?.pause();
  finishSession();
}

function skipSpeech(){
  if(SS?._audio){SS._audio.pause();SS._audio=null;}
  if(SS&&SS.phase==='speaking'){SS.phase='idle';SS.status='Hold button to speak';refreshSession();}
}

function refreshSession(){
  const el=document.getElementById('smount');
  if(el)el.innerHTML=buildSessionHTML();
  const sc=document.getElementById('smsg');
  if(sc)sc.scrollTop=sc.scrollHeight;
}

function ring(value,size){
  const r=size/2-6,circ=2*Math.PI*r,fill=(value/100)*circ,color=sc(value);
  return `<div class="ring-wrap" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg);display:block">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#ffffff08" stroke-width="5"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="5"
        stroke-dasharray="${fill} ${circ-fill}" stroke-linecap="round"
        style="transition:stroke-dasharray 1s ease"/>
    </svg>
    <div class="ring-num" style="font-size:${size*.23}px;color:${color}">${value}</div>
  </div>`;
}

function bar(value,h=5){
  return `<div class="score-bar-bg" style="height:${h}px">
    <div class="score-bar-fill" style="width:${Math.min(100,value)}%;height:100%;background:${sc(value)}"></div>
  </div>`;
}

function pill(text,color,bg){return `<span class="pill" style="color:${color};background:${bg}">${text}</span>`;}
function diffpill(d){const di=DIFFS[d-1];return pill('L'+d,di.color,di.color+'18');}

  if (!score) return `<div class="page"><p>No results yet</p></div>`;
  return `<div class="page">
    <button class="btn btn-ghost" style="margin-bottom:18px;padding:5px 12px;font-size:12px" onclick="setState({view:'dashboard'})">← Dashboard</button>
    <div class="stat-label">SESSION COMPLETE</div>
    <h1 style="font-size:22px;font-weight:800;margin-bottom:8px">Your Score</h1>
    <div class="card" style="padding:24px;margin-bottom:14px">
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px">
        ${[
          ['OVERALL',score.overall],['OPENER',score.opener],['RAPPORT',score.rapport],
          ['DISCOVERY',score.discovery],['OBJECTIONS',score.objections],['CLOSING',score.closing]
        ].map(([l,v])=>`<div class="stat-card"><div class="stat-label">${l}</div><div style="font-size:24px;font-weight:700;color:${sc(v)};font-family:'Courier New',monospace">${v}</div></div>`).join('')}
      </div>
      <div style="background:${S.surface};border:1px solid #ffffff0d;border-radius:7px;padding:14px;margin-bottom:14px">
        <div style="font-size:12px;color:${S.muted};line-height:1.6">${esc(score.summary||'Session complete.')}</div>
      </div>
      <div class="stat-label">COACHING TIPS</div>
      ${(score.next_steps||[]).map(t=>`<div style="padding:10px 12px;background:${S.card};border:1px solid #ffffff0d;border-radius:7px;margin-bottom:8px;font-size:12px;color:${S.muted}">${esc(t)}</div>`).join('')}
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-amber" style="flex:1;padding:11px" onclick="setState({view:'session-new'})">Try Again</button>
      <button class="btn btn-raised" style="flex:1;padding:11px" onclick="saveSession();setState({view:'dashboard'})">Save & Dashboard</button>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════════════════
function render() {
  const root = document.getElementById('root');
  if (!root) return;

  if (SS) {
    root.innerHTML = `<div class="session-screen" id="smount">${buildSessionHTML()}</div>`;
    return;
  }

  if (state.view === 'auth') {
    root.innerHTML = renderAuth();
  } else if (!state.user) {
    root.innerHTML = renderAuth();
  } else if (state.showUpgradeModal) {
    root.innerHTML = `
      <div class="app">
        <div class="modal" style="background:rgba(0,0,0,.85)">
          <div class="upgrade-modal">
            <h2 style="font-size:20px;font-weight:800;margin-bottom:12px">Upgrade Required</h2>
            <p style="color:${S.muted};margin-bottom:20px;font-size:14px">You've reached your session limit. Upgrade to continue training.</p>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px">
              ${STRIPE_PLANS.map(p=>`<div style="padding:16px;background:${S.card};border:1px solid #ffffff0d;border-radius:7px;text-align:center">
                <div style="font-weight:700;margin-bottom:4px">${p.name}</div>
                <div style="color:${S.amber};font-size:18px;font-weight:700;margin-bottom:8px">${p.price}</div>
                ${p.features.map(f=>`<div style="font-size:11px;color:${S.faint};margin-bottom:4px">✓ ${f}</div>`).join('')}
              </div>`).join('')}
            </div>
            <a href="https://stripe.example.com/checkout" class="btn btn-amber" style="width:100%;padding:11px;text-decoration:none;display:flex;align-items:center;justify-content:center">View Plans →</a>
            <button class="btn btn-ghost" style="width:100%;margin-top:10px;padding:8px" onclick="setState({showUpgradeModal:false})">Cancel</button>
          </div>
        </div>
        <div style="display:none">${buildSidebar()}</div>
      </div>`;
  } else {
    const pageContent = state.view === 'dashboard' ? renderDashboard() :
                       state.view === 'session-new' ? renderSessionNew() :
                       state.view === 'gpt-suite' ? renderGptMode() :
                       state.view === 'gpt-results' ? renderGptResults() :
                       renderDashboard();
    
    root.innerHTML = `
      <div class="app">
        ${buildSidebar()}
        <div class="main">
          ${pageContent}
        </div>
      </div>
      ${state.showUpgradeModal ? `<div class="modal">${renderUpgradeModal()}</div>` : ''}
    `;
  }
}

function buildSidebar() {
  return `
    <div class="sidebar">
      <div class="logo-wrap">
        <div style="font-size:16px;font-weight:800">🚀 PestPros</div>
        <div style="font-size:10px;color:${S.faint};margin-top:3px">AI Trainer</div>
      </div>
      <nav>
        <div class="nav-item ${state.view==='dashboard'?'on':''}" onclick="setState({view:'dashboard'})">📊 Dashboard</div>
        <div class="nav-item ${state.view==='session-new'?'on':''}" onclick="setState({view:'session-new'})">🎙 New Session</div>
        <div class="nav-item ${state.view==='gpt-suite'?'on':''}" onclick="setState({view:'gpt-suite'})">🤖 GPT Mode</div>
      </nav>
      <div class="user-row">
        <div class="avatar">${state.user?.email?.[0]?.toUpperCase()}</div>
        <div style="flex:1">
          <div style="font-size:11px;font-weight:600;overflow:hidden;text-overflow:ellipsis">${esc(state.user?.email||'User')}</div>
          <div style="font-size:9px;color:${S.faint}">${state.subscriptionTier}</div>
        </div>
        <button class="btn btn-ghost" style="padding:4px 8px;font-size:10px" onclick="logOut()">↓</button>
      </div>
    </div>
  `;
}

function renderUpgradeModal() {
  return `
    <div class="upgrade-modal">
      <h2 style="font-size:20px;font-weight:800;margin-bottom:12px">Upgrade Required</h2>
      <p style="color:${S.muted};margin-bottom:20px">Unlock unlimited sessions</p>
      <button class="btn btn-amber" style="width:100%;padding:11px;margin-bottom:10px">View Plans</button>
      <button class="btn btn-ghost" style="width:100%;padding:8px" onclick="setState({showUpgradeModal:false})">Maybe Later</button>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════════════
// INITIALIZATION
// ═══════════════════════════════════════════════════════════════════
async function init() {
  if (supabase) {
    const {data} = await supabase.auth.getSession();
    if (data.session) {
      setState({user:data.session.user, view:'dashboard'});
      await loadUserData();
      await loadSessions();
      await loadLeaderboard();
    }
  }
  render();
}

init();
</script>
</body>
</html>
